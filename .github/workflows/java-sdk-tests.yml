name: "Java SDK Tests"

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'java/**'
      - 'test/**'
      - '.github/workflows/java-sdk-tests.yml'
      - '!**/*.md'
      - '!**/LICENSE*'
      - '!**/.gitignore'
      - '!**/.editorconfig'
      - '!**/*.png'
      - '!**/*.jpg'
      - '!**/*.jpeg'
      - '!**/*.gif'
      - '!**/*.svg'
  workflow_dispatch:
  merge_group:

permissions:
  contents: read

jobs:
  test:
    name: "Java SDK Tests"
    if: github.event.repository.fork == false
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
        working-directory: ./java
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: "microsoft"
          cache: "maven"

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: "./nodejs/package-lock.json"

      - name: Install Node.js dependencies (for CLI version extraction)
        working-directory: ./nodejs
        run: npm ci --ignore-scripts

      - name: Install test harness dependencies
        working-directory: ./test/harness
        run: npm ci --ignore-scripts

      - name: Run spotless check
        if: runner.os == 'Linux'
        run: |
          mvn spotless:check
          if [ $? -ne 0 ]; then
            echo "❌ spotless:check failed. Please run 'mvn spotless:apply' in java"
            exit 1
          fi
          echo "✅ spotless:check passed"

      - name: Verify Javadoc generation
        if: runner.os == 'Linux'
        run: mvn javadoc:javadoc -q

      - name: Build and test
        run: mvn clean verify

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: java-test-results-${{ matrix.os }}
          path: |
            java/target/surefire-reports/
            java/target/surefire-reports-isolated/
          retention-days: 7
