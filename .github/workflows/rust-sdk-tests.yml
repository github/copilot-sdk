name: "Rust SDK Tests"

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'rust/**'
      - 'test/**'
      - 'nodejs/package.json'
      - '.github/workflows/rust-sdk-tests.yml'
      - '.github/actions/setup-copilot/**'
      - '!**/*.md'
      - '!**/LICENSE*'
      - '!**/.gitignore'
      - '!**/.editorconfig'
      - '!**/*.png'
      - '!**/*.jpg'
      - '!**/*.jpeg'
      - '!**/*.gif'
      - '!**/*.svg'
  workflow_dispatch:
  merge_group:

permissions:
  contents: read

jobs:
  test:
    name: "Rust SDK Tests"
    env:
      POWERSHELL_UPDATECHECK: Off
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
        working-directory: ./rust
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: ./.github/actions/setup-copilot
        id: setup-copilot
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "rust -> target"

      - name: Run cargo fmt check
        if: runner.os == 'Linux'
        working-directory: ./rust
        run: |
          cargo fmt -- --check
          echo "✅ cargo fmt produced no changes"

      - name: Run cargo clippy
        if: runner.os == 'Linux'
        working-directory: ./rust
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Install test harness dependencies
        working-directory: ./test/harness
        run: npm ci --ignore-scripts

      - name: Warm up PowerShell
        if: runner.os == 'Windows'
        run: pwsh.exe -Command "Write-Host 'PowerShell ready'"

      - name: Run Rust SDK tests
        env:
          COPILOT_HMAC_KEY: ${{ secrets.COPILOT_DEVELOPER_CLI_INTEGRATION_HMAC_KEY }}
          COPILOT_CLI_PATH: ${{ steps.setup-copilot.outputs.cli-path }}
        run: cargo test
