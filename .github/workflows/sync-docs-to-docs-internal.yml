name: "Sync SDK docs to docs-internal"

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/sync-docs-to-docs-internal.yml"
      - ".github/scripts/sync-docs/**"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (skip push and PR creation)"
        required: false
        default: "false"
        type: boolean

concurrency:
  group: sync-docs-to-docs-internal
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  sync-docs:
    name: "Sync SDK docs"
    if: github.repository == 'github/copilot-sdk'
    runs-on: ubuntu-latest
    env:
      DOCS_INTERNAL_DIR: docs-internal-checkout
      SDK_DOCS_TARGET: content/copilot/sdk-docs
      SYNC_BRANCH: sdk-docs/auto-sync
      ASSETS_TARGET: assets/images/help/copilot/sdk-docs

    steps:
      - name: Checkout copilot-sdk
        uses: actions/checkout@v4

      - name: Checkout docs-internal
        uses: actions/checkout@v4
        with:
          repository: github/docs-internal
          token: ${{ secrets.DOCS_INTERNAL_TOKEN }}
          path: ${{ env.DOCS_INTERNAL_DIR }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install sync script dependencies
        working-directory: .github/scripts/sync-docs
        run: npm ci

      - name: Clean existing SDK docs in docs-internal
        run: |
          rm -rf "$DOCS_INTERNAL_DIR/$SDK_DOCS_TARGET"
          rm -rf "$DOCS_INTERNAL_DIR/$ASSETS_TARGET"

      - name: Copy SDK docs to docs-internal
        run: |
          mkdir -p "$DOCS_INTERNAL_DIR/$SDK_DOCS_TARGET"
          # Copy markdown files and directories, excluding .validation/
          rsync -av --exclude='.validation/' docs/ "$DOCS_INTERNAL_DIR/$SDK_DOCS_TARGET/"

      - name: Normalize content
        run: |
          node .github/scripts/sync-docs/normalize-sdk-docs.mjs \
            --content-dir "$DOCS_INTERNAL_DIR/content" \
            --sdk-docs-dir "$DOCS_INTERNAL_DIR/$SDK_DOCS_TARGET"

      - name: Convert Mermaid diagrams to PNG
        run: |
          node .github/scripts/sync-docs/convert-mermaid.mjs \
            --sdk-docs-dir "$DOCS_INTERNAL_DIR/$SDK_DOCS_TARGET" \
            --assets-dir "$DOCS_INTERNAL_DIR/$ASSETS_TARGET"

      - name: Check for changes
        id: changes
        working-directory: ${{ env.DOCS_INTERNAL_DIR }}
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No changes detected."
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Changes detected:"
            git diff --cached --stat
          fi

      - name: Commit and push
        if: steps.changes.outputs.has_changes == 'true' && inputs.dry_run != 'true'
        working-directory: ${{ env.DOCS_INTERNAL_DIR }}
        env:
          GH_TOKEN: ${{ secrets.DOCS_INTERNAL_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Create or reset the sync branch from main
          git checkout -B "$SYNC_BRANCH"
          git commit -m "Sync Copilot SDK docs from github/copilot-sdk@${GITHUB_SHA::7}

          Source commit: https://github.com/github/copilot-sdk/commit/$GITHUB_SHA

          This PR was automatically generated by the sync-docs-to-docs-internal
          workflow in github/copilot-sdk."

          git push --force-with-lease origin "$SYNC_BRANCH"

      - name: Create or update pull request
        if: steps.changes.outputs.has_changes == 'true' && inputs.dry_run != 'true'
        working-directory: ${{ env.DOCS_INTERNAL_DIR }}
        env:
          GH_TOKEN: ${{ secrets.DOCS_INTERNAL_TOKEN }}
        run: |
          PR_TITLE="Sync Copilot SDK docs (auto-generated)"
          PR_BODY="## Summary

          This PR syncs documentation from [\`github/copilot-sdk/docs\`](https://github.com/github/copilot-sdk/tree/main/docs) to \`content/copilot/sdk-docs/\`.

          **Source commit:** https://github.com/github/copilot-sdk/commit/$GITHUB_SHA

          ### What this PR does
          - Copies SDK documentation from \`copilot-sdk\`
          - Adds YAML frontmatter for docs.github.com publishing
          - Converts internal links to AUTOTITLE format
          - Converts Mermaid diagrams to PNG images
          - Normalizes code fence languages and list formatting

          > [!NOTE]
          > This PR is auto-generated. Do not edit it directly—make changes in the [copilot-sdk docs](https://github.com/github/copilot-sdk/tree/main/docs) instead.

          ---
          _Generated by the [sync-docs-to-docs-internal](https://github.com/github/copilot-sdk/actions/workflows/sync-docs-to-docs-internal.yml) workflow._"

          # Check if a PR already exists for this branch
          EXISTING_PR=$(gh pr list --head "$SYNC_BRANCH" --json number --jq '.[0].number' 2>/dev/null || true)

          if [ -n "$EXISTING_PR" ]; then
            echo "Updating existing PR #$EXISTING_PR"
            gh pr edit "$EXISTING_PR" --title "$PR_TITLE" --body "$PR_BODY"
            gh pr comment "$EXISTING_PR" --body "🔄 Updated with changes from [\`${GITHUB_SHA::7}\`](https://github.com/github/copilot-sdk/commit/$GITHUB_SHA)."
          else
            echo "Creating new PR"
            gh pr create \
              --title "$PR_TITLE" \
              --body "$PR_BODY" \
              --base main \
              --head "$SYNC_BRANCH" \
              --label "copilot-sdk-docs"
          fi
