name: "Update @github/copilot Dependency"

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Target version of @github/copilot (e.g. 0.0.420)'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    name: "Update @github/copilot to ${{ inputs.version }}"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Update @github/copilot in nodejs
        working-directory: ./nodejs
        run: npm install @github/copilot@${{ inputs.version }}

      - name: Update @github/copilot in test harness
        working-directory: ./test/harness
        run: npm install @github/copilot@${{ inputs.version }}

      - name: Refresh nodejs/samples lockfile
        working-directory: ./nodejs/samples
        run: npm install

      - name: Install codegen dependencies
        working-directory: ./scripts/codegen
        run: npm ci

      - name: Run codegen
        working-directory: ./scripts/codegen
        run: npm run generate

      - name: Format generated code
        run: |
          cd nodejs && npm run format
          cd ../dotnet && dotnet format src/GitHub.Copilot.SDK.csproj

      - name: Create pull request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="update-copilot-${{ inputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add -A
          git commit -m "Update @github/copilot to ${{ inputs.version }}

          - Updated nodejs and test harness dependencies
          - Re-ran code generators
          - Formatted generated code"
          git push origin "$BRANCH"
          gh pr create \
            --title "Update @github/copilot to ${{ inputs.version }}" \
            --body "Automated update of \`@github/copilot\` to version \`${{ inputs.version }}\`.

          ### Changes
          - Updated \`@github/copilot\` in \`nodejs/package.json\` and \`test/harness/package.json\`
          - Re-ran all code generators (\`scripts/codegen\`)
          - Formatted generated output

          > Created by the **Update @github/copilot Dependency** workflow." \
            --base main \
            --head "$BRANCH"
