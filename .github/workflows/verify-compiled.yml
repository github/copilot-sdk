name: Verify compiled workflows

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - ".github/workflows/*.md"
      - ".github/workflows/*.lock.yml"

permissions:
  contents: read

jobs:
  verify:
    if: github.event.repository.fork == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install gh-aw CLI
        uses: github/gh-aw-actions/setup-cli@8bdba8075360648fe6802302a5b4e016361dc6ac # v0.83.1
        with:
          version: v0.83.1
      - name: Recompile workflows
        run: gh aw compile
      - name: Check for uncommitted changes
        run: |
          if [ -n "$(git diff)" ]; then
            echo "::error::Lock files are out of date. Run 'gh aw compile' and commit the results."
            echo ""
            git diff --stat
            echo ""
            git diff -- '*.lock.yml'
            exit 1
          fi
          echo "All lock files are up to date."
