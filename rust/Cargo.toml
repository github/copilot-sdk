[package]
name = "copilot-sdk"
version = "0.1.0"
edition = "2021"
description = "Rust SDK for programmatic control of GitHub Copilot CLI via JSON-RPC."
keywords = ["copilot", "github", "ai", "json-rpc", "sdk"]
categories = ["api-bindings", "development-tools"]
publish = false

[lib]
name = "copilot"

[features]
default = ["embedded-cli"]
embedded-cli = ["dep:sha2", "dep:zstd"]
derive = ["dep:schemars"]

[dependencies]
async-trait = "0.1"
schemars = { version = "1", optional = true }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
tokio = { version = "1", features = ["io-util", "sync", "rt", "process", "net", "time", "macros"] }
tracing = "0.1"
dirs = "5"
parking_lot = "0.12"
regex = "1"
sha2 = { version = "0.10", optional = true }
zstd = { version = "0.13", optional = true }

[dev-dependencies]
schemars = "1"
serial_test = "3"
tempfile = "3"
sha2 = "0.10"
zstd = "0.13"

[build-dependencies]
flate2 = "1"
sha2 = "0.10"
tar = "0.4"
zip = { version = "2", default-features = false, features = ["deflate"] }
zstd = "0.13"
