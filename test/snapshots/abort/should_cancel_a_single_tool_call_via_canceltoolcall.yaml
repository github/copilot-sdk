models:
  - claude-sonnet-4.5
conversations:
  - messages:
      - role: system
        content: ${system}
      - role: user
        content: Use slow_analysis with value 'test_cancel'. Wait for the result.
      - role: assistant
        content: I'll call the slow_analysis tool with the value 'test_cancel' and wait for it to complete.
      - role: assistant
        tool_calls:
          - id: toolcall_0
            type: function
            function:
              name: report_intent
              arguments: '{"intent":"Running slow analysis test"}'
      - role: assistant
        tool_calls:
          - id: toolcall_1
            type: function
            function:
              name: slow_analysis
              arguments: '{"value":"test_cancel"}'
