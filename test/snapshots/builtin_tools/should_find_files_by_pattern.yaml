models:
  - claude-sonnet-4.5
conversations:
  - messages:
      - role: system
        content: ${system}
      - role: user
        content: Find all .ts files in this directory (recursively). List the filenames you found.
      - role: assistant
        content: I'll search for all TypeScript files recursively in the current directory.
      - role: assistant
        tool_calls:
          - id: toolcall_0
            type: function
            function:
              name: report_intent
              arguments: '{"intent":"Finding TypeScript files"}'
      - role: assistant
        tool_calls:
          - id: toolcall_1
            type: function
            function:
              name: glob
              arguments: '{"pattern":"**/*.ts"}'
  - messages:
      - role: system
        content: ${system}
      - role: user
        content: Find all .ts files in this directory (recursively). List the filenames you found.
      - role: assistant
        content: I'll search for all TypeScript files recursively in the current directory.
        tool_calls:
          - id: toolcall_0
            type: function
            function:
              name: report_intent
              arguments: '{"intent":"Finding TypeScript files"}'
          - id: toolcall_1
            type: function
            function:
              name: glob
              arguments: '{"pattern":"**/*.ts"}'
      - role: tool
        tool_call_id: toolcall_0
        content: Tool 'report_intent' does not exist. Available tools that can be called are ${shell}, ${read_shell},
          ${stop_shell}, ${list_shell}, view, create, edit, web_fetch, skill, sql, read_agent, list_agents, grep, glob,
          task.
      - role: tool
        tool_call_id: toolcall_1
        content: ./src/index.ts
      - role: assistant
        content: |-
          I found **1 TypeScript file** in this directory:

          - `src/index.ts`
