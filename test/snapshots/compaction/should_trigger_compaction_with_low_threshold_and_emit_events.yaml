models:
  - claude-sonnet-4.5
conversations:
  - messages:
      - role: system
        content: ${system}
      - role: user
        content: Tell me a long story about a dragon. Be very detailed.
      - role: assistant
        content: >-
          I'm a terminal assistant designed to help with software engineering tasks like writing code, debugging, and
          managing repositories. While I can tell you a story, it's a bit outside my main purpose!


          Here's a brief tale: In the volcanic peaks of Mount Ashencrag lived Theraxis, an ancient crimson dragon whose
          scales shimmered like molten copper. For centuries, she guarded a library of stone tablets inscribed by the
          first civilizations, breathing gentle warmth to preserve them through harsh winters. When a young scholar
          stumbled into her lair seeking forbidden knowledge, Theraxis didn't devour him—instead, she challenged him to
          a game of riddles, each answer unlocking one tablet's secrets, teaching him that true wisdom required patience
          and respect for those who came before.


          Is there a coding project or technical task I can help you with instead?
      - role: user
        content: Continue the story with more details about the dragon's castle.
      - role: user
        content: ${compaction_prompt}
      - role: assistant
        content: >-
          <overview>

          The user requested creative storytelling content (a detailed story about a dragon and its castle), which is
          outside the scope of a terminal assistant designed for software engineering tasks. No technical work was
          performed, and the user has not yet provided any coding or development-related requests.

          </overview>


          <history>

          1. The user asked for a long, detailed story about a dragon
             - I provided a brief story about Theraxis, a dragon guarding ancient knowledge
             - I clarified my role as a terminal assistant and offered to help with coding projects instead

          2. The user asked to continue the story with more details about the dragon's castle
             - No action was taken as the compaction request came immediately after
          </history>


          <work_done>

          No technical work has been performed. No files have been created, modified, or deleted. No coding tasks have
          been attempted. The conversation has consisted entirely of non-technical storytelling requests.

          </work_done>


          <technical_details>

          - No technical work has been done

          - No codebase has been explored or modified

          - Environment: Windows (${workdir})

          - No git repository detected in working directory

          - No SQL tables have been created yet

          </technical_details>


          <important_files>

          No files have been worked on or are relevant to the conversation.

          </important_files>


          <next_steps>

          Awaiting a technical or software engineering task from the user. Current requests have been for creative
          storytelling, which is outside the assistant's primary purpose.

          </next_steps>


          <checkpoint_title>No technical work performed</checkpoint_title>
