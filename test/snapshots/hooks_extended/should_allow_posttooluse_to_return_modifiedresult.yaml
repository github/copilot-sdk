models:
  - claude-sonnet-4.5
conversations:
  - messages:
      - role: system
        content: ${system}
      - role: user
        content: Call the view tool to read the current directory, then reply done.
      - role: assistant
        tool_calls:
          - id: toolcall_0
            type: function
            function:
              name: view
              arguments: '{"path":"${workdir}"}'
      - role: tool
        tool_call_id: toolcall_0
        content: modified by post hook
      - role: assistant
        content: Done.
