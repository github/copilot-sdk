models:
  - claude-sonnet-4.5
conversations:
  - messages:
      - role: system
        content: ${system}
      - role: user
        content: Use the magic_number tool with seed 'hello' and tell me the result
      - role: assistant
        content: I'll use the magic_number tool with seed 'hello' for you.
      - role: assistant
        tool_calls:
          - id: toolcall_0
            type: function
            function:
              name: report_intent
              arguments: '{"intent":"Getting magic number"}'
      - role: assistant
        tool_calls:
          - id: toolcall_1
            type: function
            function:
              name: magic_number
              arguments: '{"seed":"hello"}'
  - messages:
      - role: system
        content: ${system}
      - role: user
        content: Use the magic_number tool with seed 'hello' and tell me the result
      - role: assistant
        content: I'll use the magic_number tool with seed 'hello' for you.
        tool_calls:
          - id: toolcall_0
            type: function
            function:
              name: report_intent
              arguments: '{"intent":"Getting magic number"}'
          - id: toolcall_1
            type: function
            function:
              name: magic_number
              arguments: '{"seed":"hello"}'
      - role: tool
        tool_call_id: toolcall_0
        content: Tool 'report_intent' does not exist. Available tools that can be called are ${shell}, ${read_shell},
          ${stop_shell}, ${list_shell}, view, create, edit, web_fetch, skill, sql, read_agent, list_agents, grep, glob,
          task, magic_number.
      - role: tool
        tool_call_id: toolcall_1
        content: MAGIC_hello_42
