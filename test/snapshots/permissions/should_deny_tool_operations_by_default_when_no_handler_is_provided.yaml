models:
  - claude-sonnet-4.5
conversations:
  - messages:
      - role: system
        content: ${system}
      - role: user
        content: Run 'node --version'
      - role: assistant
        tool_calls:
          - id: toolcall_0
            type: function
            function:
              name: report_intent
              arguments: '{"intent":"Checking Node.js version"}'
      - role: assistant
        tool_calls:
          - id: toolcall_1
            type: function
            function:
              name: ${shell}
              arguments: '{"command":"node --version","description":"Check Node.js version"}'
  - messages:
      - role: system
        content: ${system}
      - role: user
        content: Run 'node --version'
      - role: assistant
        tool_calls:
          - id: toolcall_0
            type: function
            function:
              name: report_intent
              arguments: '{"intent":"Checking Node.js version"}'
          - id: toolcall_1
            type: function
            function:
              name: ${shell}
              arguments: '{"command":"node --version","description":"Check Node.js version"}'
      - role: tool
        tool_call_id: toolcall_0
        content: Intent logged
      - role: tool
        tool_call_id: toolcall_1
        content: |-
          v22.19.0
          <exited with exit code 0>
      - role: assistant
        content: Node.js version v22.19.0 is installed.
