models:
  - claude-sonnet-4.5
conversations:
  - messages:
      - role: system
        content: ${system}
      - role: user
        content: Run 'echo test' and tell me what happens
      - role: assistant
        tool_calls:
          - id: toolcall_0
            type: function
            function:
              name: report_intent
              arguments: '{"intent":"Running echo command"}'
      - role: assistant
        tool_calls:
          - id: toolcall_1
            type: function
            function:
              name: ${shell}
              arguments: '{"command":"echo test","description":"Run echo test"}'
  - messages:
      - role: system
        content: ${system}
      - role: user
        content: Run 'echo test' and tell me what happens
      - role: assistant
        tool_calls:
          - id: toolcall_0
            type: function
            function:
              name: report_intent
              arguments: '{"intent":"Running echo command"}'
          - id: toolcall_1
            type: function
            function:
              name: ${shell}
              arguments: '{"command":"echo test","description":"Run echo test"}'
      - role: tool
        tool_call_id: toolcall_0
        content: Tool 'report_intent' does not exist. Available tools that can be called are powershell, read_powershell,
          stop_powershell, list_powershell, view, create, edit, web_fetch, skill, sql, read_agent, list_agents, grep,
          glob, task.
      - role: tool
        tool_call_id: toolcall_1
        content: |-
          test
          <exited with exit code 0>
      - role: assistant
        content: The command ran successfully and output `test` to the console. It completed with exit code 0, which means it
          executed without any errors.
