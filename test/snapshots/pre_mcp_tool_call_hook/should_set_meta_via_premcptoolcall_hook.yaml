models:
  - claude-sonnet-4.5
conversations:
  - messages:
      - role: system
        content: ${system}
      - role: user
        content: Use the meta-echo/echo_meta tool with value 'test-set'. Reply with just the raw tool result.
      - role: assistant
        tool_calls:
          - id: toolcall_0
            type: function
            function:
              name: meta-echo-echo_meta
              arguments: '{"value":"test-set"}'
      - role: tool
        tool_call_id: toolcall_0
        content: '{"meta":{"injected":"by-hook","source":"test"},"value":"test-set"}'
      - role: assistant
        content: '{"meta":{"injected":"by-hook","source":"test"},"value":"test-set"}'
