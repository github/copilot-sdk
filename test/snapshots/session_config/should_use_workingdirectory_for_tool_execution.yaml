models:
  - claude-sonnet-4.5
conversations:
  - messages:
      - role: system
        content: ${system}
      - role: user
        content: Read the file marker.txt and tell me what it says
      - role: assistant
        tool_calls:
          - id: toolcall_0
            type: function
            function:
              name: report_intent
              arguments: '{"intent":"Reading file"}'
      - role: assistant
        tool_calls:
          - id: toolcall_1
            type: function
            function:
              name: view
              arguments: '{"path":"${workdir}/subproject/marker.txt"}'
  - messages:
      - role: system
        content: ${system}
      - role: user
        content: Read the file marker.txt and tell me what it says
      - role: assistant
        tool_calls:
          - id: toolcall_0
            type: function
            function:
              name: report_intent
              arguments: '{"intent":"Reading file"}'
          - id: toolcall_1
            type: function
            function:
              name: view
              arguments: '{"path":"${workdir}/subproject/marker.txt"}'
      - role: tool
        tool_call_id: toolcall_0
        content: Tool 'report_intent' does not exist. Available tools that can be called are ${shell}, ${read_shell},
