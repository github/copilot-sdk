conversations:
  - messages:
      - role: system
        content: ${system}
      - role: user
        content: Use the view tool to look at the file test.png and describe what you see
      - role: assistant
        content: I'll use the view tool to look at the test.png file and describe what I see.
      - role: assistant
        tool_calls:
          - id: toolcall_0
            type: function
            function:
              name: report_intent
              arguments: '{"intent":"Viewing image file"}'
      - role: assistant
        tool_calls:
          - id: toolcall_1
            type: function
            function:
              name: view
              arguments: '{"path":"${workdir}/test.png"}'
