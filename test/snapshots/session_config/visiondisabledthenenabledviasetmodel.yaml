            function:
              name: view
              arguments: '{"path":"${workdir}/test.png"}'
      - role: tool
        tool_call_id: toolcall_0
        content: Intent logged
      - role: tool
        tool_call_id: toolcall_1
        content: Viewed image file successfully.
      - role: assistant
        content: The image shows a simple **GitHub Copilot logo** - it's the iconic orange/coral colored hexagonal icon with a
