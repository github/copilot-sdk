          2. CREATE TABLE todo_deps (todo_id TEXT, depends_on TEXT, PRIMARY KEY (todo_id, depends_on));

          3. INSERT INTO todos (id, title, status) VALUES ('alpha', 'First todo', 'pending');

          4. INSERT INTO todos (id, title, status) VALUES ('beta', 'Second todo', 'done');

          5. INSERT INTO todo_deps (todo_id, depends_on) VALUES ('beta', 'alpha');

          Then stop. Do not insert any other rows or create any other tables.
