models:
  - claude-sonnet-4.5
conversations:
  - messages:
      - role: system
        content: ${system}
      - role: user
        content: Use grep to search for the word 'hello'
      - role: assistant
        content: I'll search for the word 'hello' in the current directory.
      - role: assistant
        tool_calls:
          - id: toolcall_0
            type: function
            function:
              name: report_intent
              arguments: "{\"intent\":\"Searching for 'hello'\"}"
      - role: assistant
        tool_calls:
          - id: toolcall_1
            type: function
            function:
              name: grep
              arguments: '{"query":"hello"}'
  - messages:
      - role: system
        content: ${system}
      - role: user
        content: Use grep to search for the word 'hello'
      - role: assistant
        content: I'll search for the word 'hello' in the current directory.
        tool_calls:
          - id: toolcall_0
            type: function
            function:
              name: report_intent
              arguments: "{\"intent\":\"Searching for 'hello'\"}"
          - id: toolcall_1
            type: function
            function:
              name: grep
              arguments: '{"query":"hello"}'
      - role: tool
        tool_call_id: toolcall_0
        content: Tool 'report_intent' does not exist. Available tools that can be called are powershell, read_powershell,
          stop_powershell, list_powershell, view, create, edit, web_fetch, skill, sql, read_agent, list_agents, glob,
          task, grep.
      - role: tool
        tool_call_id: toolcall_1
        content: "CUSTOM_GREP_RESULT: hello"
      - role: assistant
        content: "Found: The search returned `CUSTOM_GREP_RESULT: hello`, indicating the grep tool found the word 'hello' in the
          codebase."
