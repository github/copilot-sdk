models:
  - claude-sonnet-4.5
conversations:
  - messages:
      - role: system
        content: ${system}
      - role: user
        content: Use grep to search for the word 'hello'
      - role: assistant
        tool_calls:
          - id: toolcall_0
            type: function
            function:
              name: grep
              arguments: '{"query":"hello"}'
      - role: tool
        tool_call_id: toolcall_0
        content: "CUSTOM_GREP_RESULT: hello"
      - role: assistant
        content: "The grep result is: **CUSTOM_GREP_RESULT: hello**"
